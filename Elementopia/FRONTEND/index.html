
<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elementopia</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = '<div style="color:red; font-size:20px; padding:20px; z-index:99999; position:absolute; top:0; left:0; background:black; width:100%; height:100%;">' + message + '<br/><br/>' + (error && error.stack) + '</div>';
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
